<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-in-the-Loop Validation Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 20px; color: #3f3f46; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { margin-top: 0; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; }
        .card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 15px; margin-bottom: 15px; background: #fff; display: flex; justify-content: space-between; align-items: center; }
        .edge-info { flex-grow: 1; }
        .edge-type { font-size: 0.8em; font-weight: bold; padding: 3px 6px; border-radius: 4px; margin-right: 10px; }
        .type-inferred { background-color: #fef08a; color: #854d0e; }
        .type-ambiguous { background-color: #fecaca; color: #991b1b; }
        .actions button { padding: 8px 12px; margin-left: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background-color: #bbf7d0; color: #166534; }
        .btn-reject { background-color: #fecaca; color: #991b1b; }
        .btn-escalate { background-color: #e5e7eb; color: #374151; }
        .export-btn { margin-top: 20px; padding: 10px 15px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Graph Validation Dashboard</h1>
        
        <div class="controls">
            <label for="filePicker">Load `graph.json` to review inferred and ambiguous edges:</label>
            <input type="file" id="filePicker" accept=".json">
        </div>

        <div id="status">Please load a graph file.</div>
        <div id="cards-container"></div>
        
        <button id="exportBtn" class="export-btn" style="display: none;">Export Verified Edges JSON</button>
    </div>

    <script>
        let graphData = null;
        let validationState = {};

        document.getElementById('filePicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    graphData = JSON.parse(e.target.result);
                    renderCards();
                } catch (err) {
                    document.getElementById('status').innerText = "Error parsing JSON: " + err;
                }
            };
            reader.readAsText(file);
        });

        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            if (!graphData.edges) {
                document.getElementById('status').innerText = "No edges found in JSON.";
                return;
            }

            const reviewableEdges = graphData.edges.filter(e => 
                e.edge_type === 'Inferred' || e.edge_type === 'Ambiguous'
            );

            if (reviewableEdges.length === 0) {
                document.getElementById('status').innerText = "No Inferred or Ambiguous edges found requiring review.";
                return;
            }

            document.getElementById('status').innerText = `Found ${reviewableEdges.length} edges requiring validation.`;
            document.getElementById('exportBtn').style.display = 'block';

            reviewableEdges.forEach((edge, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${index}`;

                const typeClass = edge.edge_type === 'Inferred' ? 'type-inferred' : 'type-ambiguous';
                
                let sourceName = edge.source;
                let targetName = edge.target;
                
                // Lookup node names if nodes exist
                if (graphData.nodes) {
                    const srcNode = graphData.nodes.find(n => n.id === edge.source);
                    const tgtNode = graphData.nodes.find(n => n.id === edge.target);
                    if (srcNode) sourceName = srcNode.name || srcNode.id;
                    if (tgtNode) targetName = tgtNode.name || tgtNode.id;
                }

                card.innerHTML = `
                    <div class="edge-info">
                        <span class="edge-type ${typeClass}">${edge.edge_type}</span>
                        <strong>${sourceName}</strong> &rarr; <strong>${targetName}</strong>
                        <div style="font-size: 0.85em; color: #6b7280; margin-top: 5px;">Weight: ${edge.weight} | Edge ID: ${edge.source}-${edge.target}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-confirm" onclick="setDecision(${index}, 'Confirmed', '${edge.source}', '${edge.target}')">Confirm ✓</button>
                        <button class="btn-reject" onclick="setDecision(${index}, 'Rejected', '${edge.source}', '${edge.target}')">Reject ✗</button>
                        <button class="btn-escalate" onclick="setDecision(${index}, 'Escalated', '${edge.source}', '${edge.target}')">Escalate ?</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.setDecision = function(index, decision, source, target) {
            validationState[`${source}-${target}`] = decision;
            const card = document.getElementById(`card-${index}`);
            card.style.opacity = '0.5';
            
            let color = '#fff';
            if (decision === 'Confirmed') color = '#dcfce3';
            if (decision === 'Rejected') color = '#fee2e2';
            if (decision === 'Escalated') color = '#f3f4f6';
            
            card.style.backgroundColor = color;
        };

        document.getElementById('exportBtn').addEventListener('click', function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(validationState, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "validated_edges.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });
    </script>
</body>
</html>
